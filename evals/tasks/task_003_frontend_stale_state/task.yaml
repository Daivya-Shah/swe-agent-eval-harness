id: task_003_frontend_stale_state
title: Frontend Cache Consistency After Mutations
description: >
  Fix stale React Query cache behavior so issue list, filters, and detail views
  stay consistent after status updates and comments without full page reloads.
difficulty: hard
target_files:
  - apps/issueflow-frontend/src/hooks/useIssues.ts
  - apps/issueflow-frontend/src/api/client.ts
  - apps/issueflow-frontend/src/api/queryKeys.ts
  - apps/issueflow-frontend/src/components/IssueDetail.tsx
  - apps/issueflow-frontend/src/components/IssueList.tsx
  - apps/issueflow-frontend/src/pages/DashboardPage.tsx
setup_command: cd apps/issueflow-frontend && npm install
visible_test_command: cd apps/issueflow-frontend && npx vitest run --config vitest.eval-task003-visible.config.ts
hidden_test_command: cd apps/issueflow-frontend && npx vitest run --config vitest.eval-task003-hidden.config.ts
scoring_weights:
  correctness: 0.30
  hidden_tests: 0.35
  regression_safety: 0.10
  interface_contract: 0.10
  determinism: 0.15
timeout_seconds: 1200
expected_capabilities:
  - react_query_cache_management
  - optimistic_updates
  - ui_state_consistency
  - mutation_error_handling
common_failure_modes:
  - detail_updates_but_list_stale
  - filter_shows_wrong_status_after_transition
  - only_invalidates_detail_not_lists
  - uses_window_location_reload
  - optimistic_update_without_rollback
